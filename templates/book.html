<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скачать</title>
    <style>
        body { font-family: sans-serif; background: #fff; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; }
        h1 { font-size: 1.5rem; color: #222; margin-bottom: 30px; }
        .download-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { padding: 20px; border-radius: 12px; text-decoration: none; font-weight: bold; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.2s; }
        .EPUB { background: #8e44ad; }
        .MOBI { background: #2980b9; }
        .FB2 { background: #27ae60; }
        .PDF { background: #c0392b; }
        .OTHER { background: #7f8c8d; }
        .btn:active { opacity: 0.7; transform: scale(0.95); }
        .back { display: block; margin-top: 40px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ title }}</h1>
        <p>Доступные форматы:</p>
        <div class="download-grid">
            {% for fmt in formats %}
            <a href="/download/{{ fmt.path }}" class="btn {{ fmt.name if fmt.name in ['EPUB','MOBI','FB2','PDF'] else 'OTHER' }}">
                <span>{{ fmt.name }}</span>
                <small style="font-size: 10px; opacity: 0.8;">СКАЧАТЬ</small>
            </a>
            {% endfor %}
        </div>
        {% if not formats %}
        <p style="color:red">Извините, прямые ссылки не найдены. Попробуйте другую книгу.</p>
        {% endif %}
        <a href="javascript:history.back()" class="back">← Назад</a>
    </div>
</body>
</html>
