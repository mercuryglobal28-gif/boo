<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Электронная Библиотека</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; }
        header { background: #2c3e50; color: white; width: 100%; padding: 20px 0; text-align: center; }
        .container { width: 90%; max-width: 600px; margin-top: 50px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
        input { width: 70%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; font-size: 16px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #c0392b; }
    </style>
</head>
<body>
    <header><h1>Электронная Библиотека</h1><p>Поиск книг</p></header>
    <div class="container">
        <form action="/search" method="GET">
            <input type="text" name="q" placeholder="Введите название или автора..." required>
            <button type="submit">Искать</button>
        </form>
    </div>
</body>
</html>
