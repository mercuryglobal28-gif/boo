<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة النخبة | Flibusta Proxy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-6 border-b border-gray-800 flex justify-between items-center glass sticky top-0 z-50">
        <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">مكتبة النخبة</h1>
    </nav>

    <main class="container mx-auto px-4 py-12">
        <div class="text-center mb-12">
            <h2 class="text-4xl font-extrabold mb-4">ابحث عن كتابك المفضل</h2>
            <p class="text-gray-400">وصول مباشر لملايين الكتب عبر Flibusta</p>
            
            <div class="mt-8 max-w-2xl mx-auto flex gap-2">
                <input type="text" id="searchInput" placeholder="اسم الكتاب أو الكاتب..." 
                       class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700 focus:outline-none focus:border-blue-500 transition">
                <button onclick="searchBooks()" class="bg-blue-600 hover:bg-blue-700 px-8 py-4 rounded-xl font-bold transition">بحث</button>
            </div>
        </div>

        <div id="results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <script>
        async function searchBooks() {
            const query = document.getElementById('searchInput').value;
            const resultsDiv = document.getElementById('results');
            
            resultsDiv.innerHTML = '<p class="text-center col-span-full">جاري البحث...</p>';
            
            try {
                const response = await fetch(`/api/search?q=${query}`);
                const data = await response.json();
                
                resultsDiv.innerHTML = '';
                
                if (data.length === 0) {
                    resultsDiv.innerHTML = '<p class="text-center col-span-full text-red-400">لم يتم العثور على نتائج.</p>';
                    return;
                }

                data.forEach(book => {
                    resultsDiv.innerHTML += `
                        <div class="glass p-6 rounded-2xl hover:transform hover:scale-105 transition duration-300">
                            <div class="h-40 bg-gray-700 rounded-lg mb-4 flex items-center justify-center">
                                <span class="text-5xl">📖</span>
                            </div>
                            <h3 class="text-xl font-bold mb-2 truncate">${book.title}</h3>
                            <div class="flex gap-2 mt-4">
                                <a href="${book.link}" target="_blank" class="flex-1 text-center bg-gray-100 text-black py-2 rounded-lg font-bold text-sm">عرض</a>
                                <a href="https://flibusta.is/b/${book.id}/epub" class="flex-1 text-center bg-green-600 py-2 rounded-lg font-bold text-sm">EPUB</a>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                resultsDiv.innerHTML = '<p class="text-center col-span-full text-red-400">حدث خطأ في الاتصال بالخادم.</p>';
            }
        }
    </script>
</body>
</html>
